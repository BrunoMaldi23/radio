logLevel: info

authInternalUsers:
  - user: radio_admin
    pass: "${MEDIAMTX_API_PASSWORD}"
    ips: ['127.0.0.1', '::1', '172.16.0.0/12']
    permissions:
      - action: api
      - action: metrics

readTimeout: 10s
writeTimeout: 10s

api: yes
apiAddress: :9997

metrics: yes
metricsAddress: :9998

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: mpegts
hlsSegmentCount: 6
hlsSegmentDuration: 2s

srt: yes
srtAddress: :8890

webrtc: yes
webrtcAddress: :8889

paths:
  tv:
    source: publisher
  radio-visual:
    source: publisher
